[production]
CLI_HTTP_HOST = "https://matecat-production.up.railway.app"
COOKIE_DOMAIN = "matecat-production.up.railway.app"
ENABLE_MULTI_DOMAIN_API = no

DB_SERVER = "${DATABASE_HOST}"
DB_DATABASE = "${DATABASE_NAME}"
DB_USER = "${DATABASE_USER}"
DB_PASS = "${DATABASE_PASSWORD}"

REDIS_SERVERS = ""
QUEUE_BROKER_ADDRESS = ""
QUEUE_JMX_ADDRESS = ""
QUEUE_CREDENTIALS = ""
SOCKET_BASE_URL = "matecat-production.up.railway.app/sse"
STORAGE_DIR = "/var/www/html/storage"

SMTP_HOST = "localhost"
SMTP_PORT = "25"
SMTP_SENDER = "no-reply@matecat-production.up.railway.app"
SMTP_HOSTNAME = "matecat-production.up.railway.app"

FILTERS_ADDRESS = "https://translated-matecat-filters-v1.p.rapidapi.com"
FILTERS_RAPIDAPI_KEY = ""

LXQ_LICENSE = false
LXQ_PARTNERID = false

FILE_STORAGE_METHOD = "local"

AUTOLOAD_PLUGINS[] = "review_extended"

AWS_VERSION = "latest"
AWS_REGION = "us-west-2"
AWS_STORAGE_BASE_BUCKET = "storage-bucket"

ENV = "production"
