[production]
CLI_HTTP_HOST = "https://matecat-production.up.railway.app" ; Use your Railway public URL
COOKIE_DOMAIN = "matecat-production.up.railway.app" ; Match your domain
ENABLE_MULTI_DOMAIN_API = no

DB_SERVER = "${DATABASE_HOST}"
DB_DATABASE = "${DATABASE_NAME}"
DB_USER = "${DATABASE_USER}"
DB_PASS = "${DATABASE_PASSWORD}"

REDIS_SERVERS = "tcp://localhost:6379" ; Placeholder, disable if not used
QUEUE_BROKER_ADDRESS = "tcp://localhost:61613" ; Placeholder, disable if not used
QUEUE_JMX_ADDRESS = "http://localhost:8161" ; Placeholder
QUEUE_CREDENTIALS = "admin:admin" ; Placeholder
SOCKET_BASE_URL = "matecat-production.up.railway.app/sse" ; Match your domain
STORAGE_DIR = "/var/www/html/storage" ; Use container path

SMTP_HOST = "localhost"
SMTP_PORT = "25"
SMTP_SENDER = "no-reply@matecat-production.up.railway.app"
SMTP_HOSTNAME = "matecat-production.up.railway.app"

; Filters Configuration
FILTERS_ADDRESS = "https://translated-matecat-filters-v1.p.rapidapi.com"
FILTERS_RAPIDAPI_KEY = "" ; Leave empty unless you have a RapidAPI key

; LexiQA Configuration
LXQ_LICENSE = false
LXQ_PARTNERID = false

FILE_STORAGE_METHOD = "local" ; Use local storage instead of S3

AUTOLOAD_PLUGINS[] = "review_extended"

; AWS S3 Settings (disabled)
;AWS_ACCESS_KEY_ID = ""
;AWS_SECRET_KEY = ""
AWS_VERSION = "latest"
AWS_REGION = "us-west-2"
;AWS_PROFILE = "default"
AWS_STORAGE_BASE_BUCKET = "storage-bucket" ; Placeholder
