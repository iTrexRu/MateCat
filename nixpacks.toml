[phases.setup]
nixPkgs = ['php81', 'php81Packages.composer', 'nodejs']
aptPkgs = ['libcurl4-openssl-dev', 'libxml2-dev', 'libpq-dev', 'libzip-dev', 'libgd-dev', 'libonig-dev', 'zlib1g-dev', 'libpng-dev', 'libicu-dev', 'openssl']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader']

[phases.build]
cmds = ['echo "Build phase complete"']

[start]
cmd = 'php -S 0.0.0.0:$PORT public/index.php'
